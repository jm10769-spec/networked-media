<html>
    <head>
        <title>Late night snack</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Order and Eat some Delicious late-night snack 🍟🍜🍛🍲🥡🥘</h1>
        <div class="narrator-bubble">
            <p class="narrator" id="narrator-text"></p>
        </div>
        <a href="sleep.html"><button class="favorite styled" type="button" id="single-button" style="display: none;">Sleep</button></a>
        
        <script>
            const fullText = "It is 2:00 AM already. I am full and satisfied, might gain another 5 lb tomorrow. Now it is time to sleep.";
            const narratorElement = document.getElementById('narrator-text');
            const singleButton = document.getElementById('single-button');
            let index = 0;
            function typeText() {
                if (index < fullText.length) {
                    narratorElement.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(typeText, 50); 
                } else {
                    //Show button after all text is displayed
                    singleButton.style.display = 'block';
                }
            }
            
            //animation when page loads
            window.addEventListener('load', typeText);
        </script>
    </body>
</html>
