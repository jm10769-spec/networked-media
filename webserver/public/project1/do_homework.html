<html>
    <head>
        <title>do homework</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Done Homework til Late Night 📚🧾</h1>
        <div class="narrator-bubble">
            <p class="narrator" id="narrator-text"></p>
        </div>
        <div class="button-container">
            <a href="sleep.html"><button class="favorite styled" type="button" id="button1" style="display: none;">Go to Sleep</button></a>
            <a href="snack.html"><button class="favorite styled" type="button" id="button2" style="display: none;">Reward myself a late-night snack!🥳</button></a>
        </div>
        
        <script>
            const fullText = "After a few hours of focused work, you finally finish your homework. Such a hardworking person. You feel a little hungry at this point and start thinking whether you should go to sleep or giving yourself a little reward.";
            const narratorElement = document.getElementById('narrator-text');
            const button1 = document.getElementById('button1');
            const button2 = document.getElementById('button2');
            let index = 0;
            function typeText() {
                if (index < fullText.length) {
                    narratorElement.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(typeText, 50); 
                } else {
                    //Show buttons after all text is displayed
                    button1.style.display = 'block';
                    button2.style.display = 'block';
                }
            }
            
            //animation when page loads
            window.addEventListener('load', typeText);
        </script>
    </body>
</html>
