<html>
    <head>
        <title>Missed Class</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>You Missed the class 😫</h1>
        <div class="narrator-bubble">
            <p class="narrator" id="narrator-text"></p>
        </div>
        <div class="button-container">
            <a href="email.html"><button class="favorite styled" type="button" id="button1" style="display: none;">Email Professor</button></a>
            <a href="lunch.html"><button class="favorite styled" type="button" id="button2" style="display: none;">Don't Care</button></a>
        </div>
        
        <script>
            const fullText = "I fall back asleep without really thinking about it. When I finally wake up again, my phone is full of notifications and missed alarms. Class is already over. Out of no choice, I...";
            const narratorElement = document.getElementById('narrator-text');
            const button1 = document.getElementById('button1');
            const button2 = document.getElementById('button2');
            let index = 0;
            function typeText() {
                if (index < fullText.length) {
                    narratorElement.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(typeText, 50); 
                } else {
                    //Show buttons after all text is displayed
                    button1.style.display = 'block';
                    button2.style.display = 'block';
                }
            }
            
            //animation when page loads
            window.addEventListener('load', typeText);
        </script>
    </body>
</html>
