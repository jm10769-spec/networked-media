<html>
    <head>
        <title>KFC</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>You Ate🍗🍔🌭...</h1>
        <div class="narrator-bubble">
            <p class="narrator" id="narrator-text"></p>
        </div>
        <a href="subway.html"><button class="favorite styled" type="button" id="single-button" style="display: none;">Go BK and take Networked-Media Class</button></a>
        
        <script>
            const fullText = "You are so unhealthy eating these junk foods and might gain 3lb the second day. Touble eating habit. Now it is time to go to the Networked-Media class";
            const narratorElement = document.getElementById('narrator-text');
            const singleButton = document.getElementById('single-button');
            let index = 0;
            function typeText() {
                if (index < fullText.length) {
                    narratorElement.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(typeText, 50); 
                } else {
                    //Show button after all text is displayed
                    singleButton.style.display = 'block';
                }
            }
            
            //animation when page loads
            window.addEventListener('load', typeText);
        </script>
    </body>
</html>
