<html>
    <head>
        <title>Reached Class</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>You Reached the Classroom on time 👩‍🏫</h1>
        <div class="narrator-bubble">
            <p class="narrator" id="narrator-text"></p>
        </div>
        <div class="button-container">
            <a href="lunch.html"><button class="favorite styled" type="button" id="button1" style="display: none;">Listen Carefully</button></a>
            <a href="lunch.html"><button class="favorite styled" type="button" id="button2" style="display: none;">Sleep</button></a>
        </div>
        
        <script>
            const fullText = "I make it to the classroom and slide into a seat near the front so I can see the blackboard. I am sososo tired, but I try to focus because this class actually matters to me. So I...";
            const narratorElement = document.getElementById('narrator-text');
            const button1 = document.getElementById('button1');
            const button2 = document.getElementById('button2');
            let index = 0;
            function typeText() {
                if (index < fullText.length) {
                    narratorElement.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(typeText, 50); 
                } else {
                    //Show buttons after all text is displayed
                    button1.style.display = 'block';
                    button2.style.display = 'block';
                }
            }
            
            //animation when page loads
            window.addEventListener('load', typeText);
        </script>
    </body>
</html>
