<html>
    <head>
        <title>On Bed</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>On Bed 🛌</h1>
        <div class="narrator-bubble">
            <p class="narrator" id="narrator-text"></p>
        </div>
        <div class="button-container">
            <a href="miss_class.html"><button class="favorite styled" type="button" id="button1" style="display: none;">Continued Sleeping</button></a>
            <a href="reach_class.html"><button class="favorite styled" type="button" id="button2" style="display: none;">Get up, Go to Class</button></a>
        </div>
        
        <script>
            const fullText = "I wake up in my dorm bed and check the time on my phone. It is 8:30. I should probably get up and go to my 9:30 class, but the air outside of blanket is so freaking cold. So I...";
            const narratorElement = document.getElementById('narrator-text');
            const button1 = document.getElementById('button1');
            const button2 = document.getElementById('button2');
            let index = 0;
            function typeText() {
                if (index < fullText.length) {
                    narratorElement.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(typeText, 50); 
                } else {
                    //Show buttons after all text is displayed
                    button1.style.display = 'block';
                    button2.style.display = 'block';
                }
            }
            
            //animation when page loads
            window.addEventListener('load', typeText);
        </script>
    </body>
</html>
