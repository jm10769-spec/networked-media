<html>
    <head>
        <title>take subway</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>You Go and Wait for the Subway 🚇</h1>
        <div class="narrator-bubble">
            <p class="narrator" id="narrator-text"></p>
        </div>
        <a href="back_home.html"><button class="favorite styled" type="button" id="single-button" style="display: none;">Back home</button></a>
        
        <script>
            const fullText = "The subway station is freezing cold and it takes you 3 bucks. But at least you are heading home now. After a 20-minute ride, you finally arrive at your dorm.";
            const narratorElement = document.getElementById('narrator-text');
            const singleButton = document.getElementById('single-button');
            let index = 0;
            function typeText() {
                if (index < fullText.length) {
                    narratorElement.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(typeText, 50); 
                } else {
                    //Show button after all text is displayed
                    singleButton.style.display = 'block';
                }
            }
            
            //animation when page loads
            window.addEventListener('load', typeText);
        </script>
    </body>
</html>
