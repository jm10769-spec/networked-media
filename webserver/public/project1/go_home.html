<html>
    <head>
        <title>go_home</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Class over! Time to back home!🏠</h1>
        <div class="narrator-bubble">
            <p class="narrator" id="narrator-text"></p>
        </div>
        <div class="button-container">
            <a href="take_shuttle.html"><button class="favorite styled" type="button" id="button1" style="display: none;">Take shuttle</button></a>
            <a href="take_subway.html"><button class="favorite styled" type="button" id="button2" style="display: none;">Take subway</button></a>
        </div>
        
        <script>
            const fullText = "The Networked-Media class has finally ended. You are so tired of coding and just want to go back home. How would you like to get home?";
            const narratorElement = document.getElementById('narrator-text');
            const button1 = document.getElementById('button1');
            const button2 = document.getElementById('button2');
            let index = 0;
            function typeText() {
                if (index < fullText.length) {
                    narratorElement.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(typeText, 50); 
                } else {
                    //Show buttons after all text is displayed
                    button1.style.display = 'block';
                    button2.style.display = 'block';
                }
            }
            
            //animation when page loads
            window.addEventListener('load', typeText);
        </script>
    </body>
</html>
