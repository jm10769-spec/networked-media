<html>
    <head>
        <title>Sleep</title>
        <link rel="stylesheet" href="style.css" />
        <style>
            body {
                background-color: black !important;
                color: white !important;
            }
            h1 {
                color: white !important;
            }
            .narrator {
                color: white !important;
            }
        </style>
    </head>
    <body>
        <h1>🌙Good Night and Sleep Well guys!😪</h1>
        <div class="narrator-bubble">
            <p class="narrator" id="narrator-text"></p>
        </div>
        <a href="in_bed.html"><button class="favorite styled" type="button" id="single-button" style="display: none;">Wake up in morning</button></a>
        
        <script>
            const fullText = "zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz💤...";
            const narratorElement = document.getElementById('narrator-text');
            const singleButton = document.getElementById('single-button');
            let index = 0;
            function typeText() {
                if (index < fullText.length) {
                    narratorElement.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(typeText, 50); 
                } else {
                    //Show button after all text is displayed
                    singleButton.style.display = 'block';
                }
            }
            
            //animation when page loads
            window.addEventListener('load', typeText);
        </script>
    </body>
</html>
