<html>
    <head>
        <title>Sending Email</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Now Compose an Email 📧</h1>
        <p class="email-description">Now write your email to your professor below. Remeber to explain why you miss the class and it will be better if you find something reasonable so the professor will not question your study attitude...</p>
        <div class="email-container">
            <div class="email-form">
                <div class="form-field">
                    <label for="recipient">To:</label>
                    <input type="text" id="recipient" value="Prof Sam, xxx@gmail.com" readonly>
                </div>
                
                <div class="compose-box-wrapper">
                    <textarea id="email-content" class="compose-box" placeholder="Type your email message here..."></textarea>
                    <a href="lunch.html"><button class="submit-btn styled">Send</button></a>
                </div>
            </div>
        </div>
    </body>
</html>
