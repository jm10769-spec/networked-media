<html>
    <head>
        <title>lunch</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Class Over, Lunch Time!!! 🥪</h1>
        <div class="narrator-bubble">
            <p class="narrator" id="narrator-text"></p>
        </div>
        <div class="button-container">
            <a href="health_lunch.html"><button class="favorite styled" type="button" id="button1" style="display: none;">Health Food</button></a>
            <a href="kfc.html"><button class="favorite styled" type="button" id="button2" style="display: none;">KFC Fried Chicken</button></a>
        </div>
        
        <script>
            const fullText = "Finally, by the time class over, it is already close to lunch. Another day of struggling what to eat. By this moment, I choose...";
            const narratorElement = document.getElementById('narrator-text');
            const button1 = document.getElementById('button1');
            const button2 = document.getElementById('button2');
            let index = 0;
            function typeText() {
                if (index < fullText.length) {
                    narratorElement.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(typeText, 50); 
                } else {
                    //Show buttons after all text is displayed
                    button1.style.display = 'block';
                    button2.style.display = 'block';
                }
            }
            
            //animation when page loads
            window.addEventListener('load', typeText);
        </script>
    </body>
</html>
