<html>
    <head>
        <title>Day By Day</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- Text -->
        <h1>☀️Day By Day🌙</h1>
        <div class="narrator-bubble">
            <p class="narrator" id="narrator-text"></p>
        </div>
        <a href="in_bed.html"><button class="favorite styled" type="button" id="single-button" style="display: none;">Start</button></a>
        
        <script>
            const fullText = "Welcome to test Sally's one day of college life. Choose what you want to do and follow Sally through the day. Get started by clicking the button below.";
            const narratorElement = document.getElementById('narrator-text');
            const singleButton = document.getElementById('single-button');
            let index = 0;
            function typeText() {
                if (index < fullText.length) {
                    narratorElement.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(typeText, 50); 
                } else {
                    //Show button after all text is displayed
                    singleButton.style.display = 'block';
                }
            }
            
            //animation when page loads
            window.addEventListener('load', typeText);
        </script>
    </body>
</html>
